services:
  - type: web
    name: parish-website
    runtime: docker
    dockerfilePath: Dockerfile
    healthCheckPath: /up
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        fromService:
          name: parish-website
          property: url
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: parish-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: parish-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: parish-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: parish-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: parish-db
          property: password
      - key: CACHE_STORE
        value: database
      - key: SESSION_DRIVER
        value: file
      - key: QUEUE_CONNECTION
        value: database
      - key: LOG_CHANNEL
        value: stack
      - key: LOG_LEVEL
        value: error
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: SESSION_SAME_SITE
        value: lax
    plan: starter
    autoDeploy: true
    branch: main

  - type: worker
    name: parish-queue-worker
    runtime: docker
    dockerfilePath: Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        fromService:
          name: parish-website
          property: envVars._APP_KEY
      - key: APP_URL
        fromService:
          name: parish-website
          property: url
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: parish-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: parish-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: parish-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: parish-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: parish-db
          property: password
      - key: QUEUE_CONNECTION
        value: database
    startCommand: php artisan queue:work --tries=3 --timeout=60 --sleep=3
    plan: starter
    autoDeploy: true
    branch: main

databases:
  - name: parish-db
    plan: starter
    databaseName: parish_website
