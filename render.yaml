services:
  - type: web
    name: parish-website
    runtime: docker
    dockerfilePath: Dockerfile
    healthCheckPath: /
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        sync: false
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: parish-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: parish-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: parish-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: parish-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: parish-db
          property: password
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: database
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_BUCKET
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false

  - type: worker
    name: parish-queue-worker
    runtime: docker
    dockerfilePath: Dockerfile
    startCommand: php artisan queue:work --tries=3 --timeout=60 --sleep=3
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: parish-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: parish-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: parish-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: parish-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: parish-db
          property: password
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file

databases:
  - name: parish-db
    plan: free
    databaseName: parish_website
