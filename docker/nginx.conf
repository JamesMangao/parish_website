server {
    listen 8080;
    server_name _;
    root /var/www/public;
    index index.php index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/ttf
        font/otf
        font/woff
        font/woff2;

    # Brotli compression (if module available)
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml image/svg+xml;

    # Serve hashed Vite assets with long cache (1 year)
    location ~* /build/assets/.*\.(css|js|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Serve public assets with moderate cache
    location ~* \.(ico|png|jpg|jpeg|gif|webp|svg|woff2?|ttf|otf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Laravel routing
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM handling
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;

        # FastCGI caching (optional, for high-traffic)
        # fastcgi_cache_valid 200 60m;
        # fastcgi_cache_valid 404 1m;
        # add_header X-FastCGI-Cache $upstream_cache_status;
    }

    # Deny access to sensitive files
    location ~ (^|/)\. {
        return 403;
    }
    location ~ ^/(\.env|composer\.json|composer\.lock|package\.json|package-lock\.json|artisan|README\.md|phpunit\.xml)$ {
        return 403;
    }

    # Favicon and robots
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Static file serving
    location ~* \.(css|js)$ {
        try_files $uri =404;
    }
}
